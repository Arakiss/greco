<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Greco self-improvement loop</title>
  <desc id="desc">A minimal visual loop showing traces flowing through validation into a harness patch.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1117"/>
      <stop offset="0.58" stop-color="#111e26"/>
      <stop offset="1" stop-color="#152923"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#f4c95d"/>
      <stop offset="0.48" stop-color="#e56b4f"/>
      <stop offset="1" stop-color="#6ed7c0"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" x2="1">
      <stop offset="0" stop-color="#f4c95d" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#e56b4f" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#6ed7c0" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="node-fill" cx="50%" cy="42%" r="64%">
      <stop offset="0" stop-color="#172934"/>
      <stop offset="1" stop-color="#0d171d"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="420" fill="url(#bg)"/>
  <path d="M0 5 H1400" stroke="url(#accent)" stroke-width="5"/>

  <g opacity="0.22" fill="none" stroke-width="1.5">
    <path d="M112 244 C276 126, 438 126, 602 244 S928 362, 1092 244 S1264 132, 1304 148"
          stroke="#6ed7c0"/>
    <path d="M112 284 C300 186, 456 186, 646 284 S968 372, 1288 214"
          stroke="#f4c95d"/>
  </g>

  <g transform="translate(150 90)">
    <path d="M80 130 H1010" stroke="url(#rail)" stroke-width="3" stroke-linecap="round"/>
    <path d="M1010 130 l-18 -12 v24 z" fill="#6ed7c0" opacity="0.85"/>

    <g font-family="SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">
      <g transform="translate(140 130)">
        <circle r="50" fill="url(#node-fill)" stroke="#f4c95d" stroke-width="2.5"/>
        <circle r="7" fill="#f4c95d"/>
        <text y="-76" font-size="20" fill="#f8f4e8">observe</text>
        <text y="86" font-size="15" fill="#93aaa6">traces</text>
      </g>

      <g transform="translate(545 130)">
        <circle r="50" fill="url(#node-fill)" stroke="#e56b4f" stroke-width="2.5"/>
        <path d="M-17 4 l13 13 28 -36" fill="none" stroke="#e56b4f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <text y="-76" font-size="20" fill="#f8f4e8">validate</text>
        <text y="86" font-size="15" fill="#93aaa6">suite + budget</text>
      </g>

      <g transform="translate(950 130)">
        <circle r="50" fill="url(#node-fill)" stroke="#6ed7c0" stroke-width="2.5"/>
        <path d="M-18 -14 H18 M-18 0 H12 M-18 14 H18" stroke="#6ed7c0" stroke-width="4" stroke-linecap="round"/>
        <text y="-76" font-size="20" fill="#f8f4e8">apply</text>
        <text y="86" font-size="15" fill="#93aaa6">patch</text>
      </g>
    </g>

    <path d="M978 184 C760 264, 410 262, 168 184" fill="none" stroke="#38565f" stroke-width="2" stroke-linecap="round"/>
    <path d="M168 184 l19 -4 -11 15 z" fill="#38565f"/>
  </g>
</svg>
