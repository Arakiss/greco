<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Greco</title>
  <desc id="desc">Greco is a local Rust coding-agent harness that observes traces, proposes harness changes, validates them against a suite, and applies passing improvements.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1117"/>
      <stop offset="0.58" stop-color="#132029"/>
      <stop offset="1" stop-color="#172a27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#f4c95d"/>
      <stop offset="0.5" stop-color="#e56b4f"/>
      <stop offset="1" stop-color="#6ed7c0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111c24"/>
      <stop offset="1" stop-color="#0d171c"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1400" height="420" fill="url(#bg)"/>
  <path d="M0 6 H1400" stroke="url(#accent)" stroke-width="6"/>
  <path d="M92 330 H1308" stroke="#243641" stroke-width="1"/>
  <path d="M92 90 H732" stroke="#314852" stroke-width="1"/>
  <path d="M92 330 C260 236, 410 222, 560 288 S860 352, 1014 238 S1222 92, 1308 138"
        fill="none" stroke="#6ed7c0" stroke-width="1.5" stroke-opacity="0.24"/>
  <path d="M92 292 C250 176, 392 150, 552 230 S850 330, 1018 206 S1200 88, 1308 110"
        fill="none" stroke="#f4c95d" stroke-width="1.5" stroke-opacity="0.18"/>

  <g transform="translate(96 94)">
    <text x="0" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" fill="#f8f4e8">Greco</text>
    <text x="4" y="138" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#d5e2dd">local coding-agent harness</text>
    <text x="4" y="178" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="21" fill="#93aaa6">observes friction, validates changes, improves itself</text>

    <g transform="translate(4 236)">
      <rect x="0" y="-16" width="184" height="34" rx="17" fill="#14232b" stroke="#35515a"/>
      <circle cx="20" cy="1" r="5" fill="#f4c95d"/>
      <text x="36" y="8" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#d5e2dd">Rust / local</text>
    </g>
  </g>

  <g transform="translate(770 72)">
    <rect x="0" y="0" width="532" height="276" rx="18" fill="url(#panel)" stroke="#31505a" stroke-width="1.5" filter="url(#soft-shadow)"/>
    <rect x="0" y="0" width="532" height="44" rx="18" fill="#0f181f"/>
    <path d="M0 44 H532" stroke="#31505a" stroke-width="1"/>
    <circle cx="28" cy="22" r="6" fill="#e56b4f"/>
    <circle cx="50" cy="22" r="6" fill="#f4c95d"/>
    <circle cx="72" cy="22" r="6" fill="#6ed7c0"/>
    <text x="104" y="28" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#93aaa6">harness-loop</text>

    <g font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="17">
      <text x="34" y="88" fill="#6ed7c0">trace</text>
      <text x="34" y="120" fill="#d5e2dd">session friction</text>
      <text x="34" y="152" fill="#93aaa6">tool misses, retries, failed edits</text>

      <path d="M44 190 H466" fill="none" stroke="#35515a" stroke-width="2"/>
      <path d="M466 190 l-12 -8 v16 z" fill="#35515a"/>

      <g transform="translate(30 204)">
        <rect x="0" y="0" width="104" height="38" rx="8" fill="#172933" stroke="#41626c"/>
        <text x="52" y="25" text-anchor="middle" fill="#d5e2dd">proposal</text>
      </g>
      <g transform="translate(164 204)">
        <rect x="0" y="0" width="104" height="38" rx="8" fill="#172933" stroke="#41626c"/>
        <text x="52" y="25" text-anchor="middle" fill="#d5e2dd">suite</text>
      </g>
      <g transform="translate(298 204)">
        <rect x="0" y="0" width="104" height="38" rx="8" fill="#172933" stroke="#41626c"/>
        <text x="52" y="25" text-anchor="middle" fill="#d5e2dd">budget</text>
      </g>
      <g transform="translate(432 204)">
        <rect x="0" y="0" width="70" height="38" rx="8" fill="#20342f" stroke="#6ed7c0"/>
        <text x="35" y="25" text-anchor="middle" fill="#6ed7c0">patch</text>
      </g>
    </g>

    <path d="M420 92 C492 122, 492 166, 426 188" fill="none" stroke="#f4c95d" stroke-width="2" stroke-opacity="0.62"/>
    <path d="M426 188 l13 2 -8 -10 z" fill="#f4c95d" fill-opacity="0.72"/>
    <text x="338" y="90" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#f4c95d">validated only</text>
  </g>
</svg>
