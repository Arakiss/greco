<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420" role="img" aria-label="Greco — a frozen model held inside a luminous self-improving loop, with modifications riding it">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#160f0c"/><stop offset="1" stop-color="#251a13"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e8835f" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#d97757" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a07e"/><stop offset="0.5" stop-color="#d97757"/><stop offset="1" stop-color="#b85c40"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="420" fill="url(#bg)"/>
  <rect x="0" y="0" width="1400" height="3" fill="#d97757" opacity="0.9"/>
  <circle cx="700" cy="210" r="380" fill="url(#glow)"/>

  <!-- the harness radiating outward as a field -->
  <g fill="none" stroke="#d97757">
    <circle cx="700" cy="210" r="300" stroke-opacity="0.06"/>
    <circle cx="700" cy="210" r="430" stroke-opacity="0.04"/>
    <circle cx="700" cy="210" r="600" stroke-opacity="0.025"/>
  </g>

  <g transform="translate(700 210)">
    <!-- the self-improving loop: layered strokes fake a luminous glow -->
    <g fill="none" stroke-linecap="round">
      <path d="M 40 -148 A 153 153 0 1 1 -40 -148" stroke="#d97757" stroke-width="22" stroke-opacity="0.14"/>
      <path d="M 40 -148 A 153 153 0 1 1 -40 -148" stroke="#d97757" stroke-width="12" stroke-opacity="0.28"/>
      <path d="M 40 -148 A 153 153 0 1 1 -40 -148" stroke="url(#ring)" stroke-width="6"/>
    </g>
    <!-- flow arrowhead: the loop closing back on itself (clockwise) -->
    <polygon points="-20,-158 -50,-150 -40,-130" fill="#f0a07e"/>

    <!-- modifications riding the loop, in different states -->
    <circle cx="153" cy="0" r="11" fill="#f0a07e"/>
    <circle cx="-108" cy="108" r="8" fill="#d97757"/>
    <circle cx="-153" cy="0" r="6" fill="#241c17" stroke="#d97757" stroke-width="2.5"/>
    <circle cx="108" cy="108" r="6" fill="#241c17" stroke="#d97757" stroke-width="2.5"/>

    <!-- the frozen model: a solid, static core that never changes -->
    <rect x="-40" y="-40" width="80" height="80" rx="14" fill="#2b211a" stroke="#8a7460" stroke-width="2.5"/>
    <g stroke="#8a7460" stroke-width="2.5" stroke-linecap="round">
      <path d="M-16 -40 V-52 M0 -40 V-52 M16 -40 V-52 M-16 40 V52 M0 40 V52 M16 40 V52"/>
      <path d="M-40 -16 H-52 M-40 0 H-52 M-40 16 H-52 M40 -16 H52 M40 0 H52 M40 16 H52"/>
    </g>
    <rect x="-13" y="-13" width="26" height="26" rx="6" fill="#d97757"/>
  </g>
</svg>
