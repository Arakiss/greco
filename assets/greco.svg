<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 420" role="img" aria-labelledby="t d">
  <title id="t">Greco</title>
  <desc id="d">The greco wordmark beside a fixed core (a frozen model) inside a flowing clay ring (the evolving harness).</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#17120f"/>
      <stop offset="1" stop-color="#221b16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d97757" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1400" height="420" fill="url(#bg)"/>
  <circle cx="1115" cy="210" r="250" fill="url(#glow)"/>
  <rect x="0" y="0" width="1400" height="3" fill="#d97757" opacity="0.9"/>

  <!-- wordmark -->
  <g transform="translate(150 0)">
    <text x="0" y="262" font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif" font-size="172" font-weight="600" letter-spacing="-4" fill="#f3ece4">greco</text>
    <rect x="6" y="292" width="132" height="6" rx="3" fill="#d97757"/>
  </g>

  <!-- motif: a frozen core inside an evolving harness -->
  <g transform="translate(1115 210)">

    <!-- evolving harness: a flowing clay ring -->
    <circle r="118" fill="none" stroke="#d97757" stroke-width="2.5" opacity="0.92"/>
    <!-- clockwise flow cue at the top -->
    <polygon points="11,-118 -4,-124 -4,-112" fill="#d97757"/>
    <!-- a few nodes where the harness changes -->
    <g fill="#221b16" stroke="#d97757" stroke-width="2.5">
      <circle cx="59" cy="102.2" r="7"/>
      <circle cx="-118" cy="0" r="7"/>
      <circle cx="59" cy="-102.2" r="7"/>
    </g>

    <!-- frozen core: a static, muted chip with a fixed clay center -->
    <g stroke="#71604f" stroke-width="2" fill="none" stroke-linejoin="round">
      <rect x="-34" y="-34" width="68" height="68" rx="11"/>
      <rect x="-17" y="-17" width="34" height="34" rx="5"/>
    </g>
    <g stroke="#71604f" stroke-width="2" stroke-linecap="round">
      <path d="M-14 -34 V-44 M0 -34 V-44 M14 -34 V-44"/>
      <path d="M-14 34 V44 M0 34 V44 M14 34 V44"/>
      <path d="M-34 -14 H-44 M-34 0 H-44 M-34 14 H-44"/>
      <path d="M34 -14 H44 M34 0 H44 M34 14 H44"/>
    </g>
    <rect x="-5" y="-5" width="10" height="10" rx="2.5" fill="#d97757"/>
  </g>
</svg>
